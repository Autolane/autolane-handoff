# sft_config_2b.toml — Autolane Handoff SFT (2B model, fast iteration)
#
# Use this config for quick validation before training the full 8B model.
# ~20 minutes per epoch on 4x A100-80GB.
#
# Usage:
#   cosmos-rl --config sft_config_2b.toml --log-dir outputs/ custom_sft.py

redis = "12800"

[custom.dataset]
annotation_path = "/data/autolane-handoff/training/llava_train.json"
media_path = "/data/autolane-handoff"
system_prompt = "You are Autolane Handoff, an autonomous delivery coordination AI. You analyze curbside zones to reason about multi-agent handoff safety, compliance, and optimal sequencing for autonomous delivery operations."

[custom.vision]
nframes = 8

[train]
optm_lr = 2e-5
output_dir = "outputs/autolane_sft_2b"
optm_warmup_steps = 0
optm_decay_type = "cosine"
optm_weight_decay = 0.01
train_batch_per_replica = 16
enable_validation = false
compile = false
epoch = 1

[train.train_policy]
type = "sft"
mini_batch = 1
dataset.test_size = 0
dataloader_num_workers = 4
dataloader_prefetch_factor = 4

[train.ckpt]
enable_checkpoint = true
save_freq = 20
export_safetensors = true

[policy]
model_name_or_path = "nvidia/Cosmos-Reason2-2B"
model_max_length = 16384
model_gradient_checkpointing = true

[policy.parallelism]
tp_size = 1
cp_size = 1
dp_shard_size = 4
pp_size = 1

[logging]
logger = ['console', 'wandb']
project_name = "autolane-handoff"
experiment_name = "curbside_handoff_sft_2b"
